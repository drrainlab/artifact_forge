# Contour lamp — the design-language hero: a round wall lamp whose face
# carries a GLOWING SVG silhouette (a pine here; paste any path into
# face.svg_path via the cockpit's SVG importer). Visual hierarchy by
# design: the light image first, the mount second, electronics hidden.
# LED strip + driver + inline switch arrive as derived BOM hardware.
schema: assembly/v1
id: pine_contour_lamp
strict: true
root: body

# one statement for every mating dimension of the snap family
shared:
  wall: 3mm
  plug_depth: 4mm
  hook_w: 8mm
  hook_len: 10mm
  lip_h: 3mm

parts:
  - ref: body
    product:
      schema: product/v1
      id: pine_lamp_body
      archetype: contour_lamp_body_v1@1
      params:
        lamp_d: 140mm
        depth: 24mm
        power_port: barrel_55
        port_z: 10mm
        psu_sx: 40mm
        mount_holes: 2       # screws straight into the wall
        mount_span: 80mm
        mount_screw: M4
      manufacturing: {material: PETG, support_policy: none}
  - ref: face
    product:
      schema: product/v1
      id: pine_lamp_face
      archetype: contour_lamp_face_v1@1
      params:
        face_d: 140mm
        face_t: 2.4mm
        seat_clearance: 0.3mm
        beam_t: 1.8mm
        lip_d: 1.6mm
        motif_w: 100mm
        glow_depth: 1.6mm    # 0.8mm membrane glows
