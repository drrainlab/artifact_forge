# Vertical Farm Pack VF-3 golden artifact: a 3-cell FLUID CASCADE row —
# inlet cap -> rail_1 -> rail_2 -> rail_3 -> collector endcap, each rail
# carrying a removable coco cassette. Water enters the cap's drip tower,
# falls into rail_1's channel, runs the slope, drips off the lip into
# rail_2, and so on into the collector's catch tray and out the drain
# tube. Every handover is a fluid_joint (gravity is the pump — verified
# downhill in the pose); every adapter hang is a saddle_hang verification.
#
# HONEST SCOPE (meta below): this row is a fluid cascade assembly proof —
# each cell sits ~7.9mm below the previous one by datum handover. It is
# NOT the final rack/shelf layout; common horizontal frame mounting
# (stepped supports / spacer feet / row carrier) is VF-4/VF-5 territory.
schema: assembly/v1
id: vertical_farm_row_3x1_petg
strict: true
root: cap

meta:
  row_kind: fluid_cascade
  mounting_policy: not_final_rack

# One source of truth for every mating dimension: the rail geometry the
# adapters hang on, the cassette envelope, the channel the spouts dip into.
shared:
  module_w: 248mm
  seat_depth: 14mm
  channel_d: 5mm
  slope_deg: 1.25
  channel_w: 16mm
  cassette_l: 220mm
  cassette_w: 220mm
  cassette_h: 26mm
  seat_clearance: 0.75mm
  wall: 2.4mm
  module_pitch: 250mm
  tube_od: 9mm

parts:
  - ref: cap
    product:
      schema: product/v1
      id: row_inlet_cap
      archetype: inlet_cap_v1@1
      params: {}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: rail_1
    product:
      schema: product/v1
      id: row_rail_1
      archetype: water_rail_v1@1
      params: {profile: "2020"}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: rail_2
    product:
      schema: product/v1
      id: row_rail_2
      archetype: water_rail_v1@1
      params: {profile: "2020"}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: rail_3
    product:
      schema: product/v1
      id: row_rail_3
      archetype: water_rail_v1@1
      params: {profile: "2020"}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: cassette_1
    product:
      schema: product/v1
      id: row_cassette_1
      archetype: coco_cassette_v1@1
      params: {}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: cassette_2
    product:
      schema: product/v1
      id: row_cassette_2
      archetype: coco_cassette_v1@1
      params: {}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: cassette_3
    product:
      schema: product/v1
      id: row_cassette_3
      archetype: coco_cassette_v1@1
      params: {}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]
  - ref: collector
    product:
      schema: product/v1
      id: row_collector
      archetype: collector_endcap_v1@1
      params: {}
      manufacturing:
        material: PETG
        support_policy: none
        bed: [250mm, 250mm, 250mm]

# Joints in CHAIN ORDER (the pipeline refuses a joint whose a: part is not
# posed yet). fluid_joint direction rule: a: hands water OUT, b: receives.
joints:
  - type: fluid_joint
    a: cap.rail_out
    b: rail_1.inlet
    rotate: [0, 0, 0]
  - type: saddle_hang
    a: rail_1.inlet
    b: cap.rail_out
    rotate: [0, 0, 0]
  - type: removable_insert
    a: rail_1.cassette_seat
    b: cassette_1.seat
    rotate: [0, 0, 0]
    params: {lift_margin: 3mm}
  - type: fluid_joint
    a: rail_1.outlet
    b: rail_2.inlet
    rotate: [0, 0, 0]
  - type: removable_insert
    a: rail_2.cassette_seat
    b: cassette_2.seat
    rotate: [0, 0, 0]
    params: {lift_margin: 3mm}
  - type: fluid_joint
    a: rail_2.outlet
    b: rail_3.inlet
    rotate: [0, 0, 0]
  - type: removable_insert
    a: rail_3.cassette_seat
    b: cassette_3.seat
    rotate: [0, 0, 0]
    params: {lift_margin: 3mm}
  - type: fluid_joint
    a: rail_3.outlet
    b: collector.rail_in
    rotate: [0, 0, 0]
  - type: saddle_hang
    a: rail_3.outlet
    b: collector.rail_in
    rotate: [0, 0, 0]

contract:
  must_have:
    - row_fluid_chain
    - saddle_mount
    - vertical_farm_cassette_interface
