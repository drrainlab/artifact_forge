schema: product/v1
id: rpi4_tray
archetype: pcb_tray_v1@1
strict: true

requested_features:
  - box_shell
  - screw_bosses
  - pass_through_cutout

params:
  tray_l: 100mm
  tray_w: 76mm
  wall_h: 14mm
  pcb_sx: 58mm    # Raspberry Pi 4 mounting-hole span
  pcb_sy: 49mm
  pilot_d: 4mm    # M3 heatset (M2.5 board screws pass the insert bore)
  cable_d: 8mm

manufacturing:
  process: fdm
  material: PETG
  support_policy: none
