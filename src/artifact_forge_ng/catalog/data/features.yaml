schema: features/v1
# The feature vocabulary — the ONLY ids that may appear in
# provides_features / requested_features / contract.must_have.
# A feature counts as BUILT iff every check in verified_by PASSed.
features:
  - id: asymmetric_side_hook
    description: side-entry hook whose lower retaining lip is measurably longer than the upper stop lip
    verified_by:
      - form.not_symmetric_c_ring
      - form.lower_lip_longer_than_upper
      - form.mouth_opens_sideways
      - topology.asymmetric_lips_geometry
      - topology.mouth_opens_sideways

  - id: side_facing_mouth
    description: cradle mouth opens sideways (+Y), not downward, not closed
    verified_by:
      - form.mouth_opens_sideways
      - form.mouth_gap_matches
      - topology.mouth_opens_sideways

  - id: through_cavity
    description: continuous cable cavity across the full part width
    verified_by:
      - form.profile_closed
      - topology.cavity_open

  - id: mounting_flange
    description: flat top mounting flange above the body
    verified_by:
      - form.flange_above_cradle
      - topology.flange_above_cradle

  - id: retaining_lower_lip
    description: long tapered lower flex lip that retains the bundle
    verified_by:
      - form.lower_lip_longer_than_upper

  - id: rounded_contact_edges
    description: cable-contact surfaces are rounded, never sharp
    verified_by:
      - form.contact_edges_rounded

  - id: countersunk_screw_holes
    description: vertical screw holes with conical countersinks in the flange
    verified_by:
      - topology.screw_holes_open
      - topology.countersinks_present

  - id: hex_perforation
    description: decorative hex lightening field confined to the safe zone
    verified_by:
      - form.hex_field_in_safe_zone
      - region.keepouts_preserved
      - topology.hex_field_present

  - id: molded_side_profile
    description: smooth molded section profile, not a boxy primitive assembly
    verified_by:
      - form.profile_smooth
      - form.wall_thickness

  # -- phase-5 vocabulary -----------------------------------------------------
  - id: hole_pattern
    description: parametric fastener hole pattern (line / grid / bolt circle)
    verified_by:
      - form.min_web_between_holes
      - form.holes_within_outline
      - topology.screw_holes_open
      - topology.countersinks_present

  - id: central_bore
    description: central through-bore
    verified_by:
      - topology.bores_open

  - id: mounting_plate_body
    description: one solid rounded mounting plate
    verified_by:
      - form.profile_closed
      - topology.single_connected_solid

  - id: cable_slots
    description: open-topped cable slots with circular resting cavities
    verified_by:
      - form.slots_open_topped
      - form.teeth_count_matches
      - topology.slots_open

  - id: slot_retention_throats
    description: slot throats narrower than the cable, snapping it in
    verified_by:
      - form.slot_throat_retention

  - id: tie_tunnel
    description: closed tunnel a zip tie threads through
    verified_by:
      - form.tunnel_fits_tie
      - topology.tunnel_open

  - id: surface_mount_base
    description: flat adhesive/screw mounting base faces
    verified_by:
      - form.regions_present

  - id: hook_bay
    description: open-topped J-hook bay
    verified_by:
      - form.bay_open_top
      - topology.bay_open

  - id: tip_lip
    description: upturned retaining lip at the hook tip
    verified_by:
      - form.tip_lip_present

  - id: wide_contact_band
    description: wide, rounded contact band for soft items
    verified_by:
      - form.regions_present
      - form.contact_edges_rounded

  - id: cantilever_arm
    description: cantilever arm welded into the mounting plate
    verified_by:
      - topology.single_connected_solid
      - topology.flange_above_cradle

  - id: wiring_channel
    description: continuous internal wiring channel from plate to arm tip
    verified_by:
      - form.channel_inside_walls
      - form.cuts_respect_keepouts
      - topology.bores_open
      - topology.channel_continuous

  - id: socket_cavity
    description: revolved cavity holding a standard lamp socket insert
    verified_by:
      - form.revolve_profile_clear_of_axis
      - topology.revolve_cavity_open

  - id: cable_exit
    description: central cable exit through the cup base
    verified_by:
      - form.revolve_profile_clear_of_axis
      - topology.revolve_cavity_open

  - id: device_rest
    description: tilted device slot with rounded contact surfaces
    verified_by:
      - form.device_slot_fits
      - form.contact_edges_rounded

  - id: stable_footprint
    description: part+device center of mass stays inside the base
    verified_by:
      - form.stability_footprint

  - id: charging_cutout
    description: cable cutout through the lip and slot floor
    verified_by:
      - form.cuts_respect_keepouts
      - topology.cutout_present

  - id: voronoi_field
    description: deterministic voronoi lightening cells with guaranteed webs
    verified_by:
      - form.min_ligament_ok
      - topology.hex_field_present

  - id: grid_slots
    description: parallel slot field clear of keepouts
    verified_by:
      - form.min_ligament_ok
      - topology.hex_field_present

  - id: magnet_pockets
    description: blind magnet pockets with intact skins
    verified_by:
      - form.cuts_respect_keepouts
      - topology.pockets_present

  - id: tie_slots
    description: zip-tie slot pair through the plate
    verified_by:
      - form.cuts_respect_keepouts
      - topology.cutout_present

  - id: stiffening_ribs
    description: welded-on stiffening ribs, verified present
    verified_by:
      - topology.ribs_present

  - id: rear_mounting_tongue
    description: in-profile rear mounting tongue — the flange lives inside the extruded section, screws along it behind the hook
    verified_by:
      - form.mount_face_flat
      - form.screw_access_clear
      - topology.screw_holes_open
      - topology.countersinks_present

  - id: support_free_by_construction
    description: constant-section extrusion exported profile-on-bed — zero overhangs by construction, not by tuning
    verified_by:
      - form.constant_section
      - manufacturing.overhang

  - id: pass_through_cutout
    description: through cutout for cables/objects, clear of every keepout
    verified_by:
      - form.cuts_respect_keepouts
      - topology.cutout_present

  - id: box_shell
    description: open-top enclosure shell keeping the declared wall and floor
    verified_by:
      - form.shell_walls_ok
      - topology.cutout_present
      - topology.single_connected_solid

  - id: screw_bosses
    description: screw bosses with blind pilot bores, welded to the floor
    verified_by:
      - topology.ribs_present
      - topology.pockets_present

  - id: snap_c_cavity
    description: symmetric snap-clip cavity wrapping past half a circle, mouth narrower than the held diameter
    verified_by:
      - form.snap_arc_coverage
      - form.snap_mouth_retains
      - topology.cavity_open

  - id: tapered_arm
    description: lofted cantilever arm, solid from root to tip
    verified_by:
      - topology.arm_reaches_tip
      - topology.single_connected_solid

  - id: bearing_seats
    description: bearing pocket + through bore with a verified retaining lip
    verified_by:
      - topology.bores_open
      - topology.seat_lips_present

  - id: phyllotaxis_field
    description: deterministic sunflower-spiral perforation with guaranteed webs
    verified_by:
      - form.min_ligament_ok
      - region.keepouts_preserved
      - topology.hex_field_present

  # -- assembly interfaces (verified in the assembled pose) -------------------
  - id: bolted_interface
    description: screw joint between two parts — coincident bolt patterns, clear axes, no material overlap
    verified_by:
      - assembly.screw_joint_ir
      - assembly.screw_axes_clear
      - assembly.no_interference

  - id: cross_part_wiring
    description: the cable passes through every part of the assembly in the assembled pose
    verified_by:
      - assembly.channel_continuous_across

  - id: lid_plug
    description: inset plug plate under a lid, welded as one solid
    verified_by:
      - topology.single_connected_solid

  - id: alignment_pins
    description: press-fit/alignment pins welded to the part
    verified_by:
      - topology.pins_present

  - id: seated_lid
    description: the lid plug drops into the shell with the declared clearance and seats on the rim
    verified_by:
      - assembly.lid_seat_ir
      - assembly.lid_seats
      - assembly.no_interference

  - id: press_fit_alignment
    description: pins press into receiving bores with the declared interference, engaged in the pose
    verified_by:
      - assembly.press_fit_ir
      - assembly.pins_engage

  - id: truss_web
    description: warren-truss triangular lightening between solid chords, ligaments measured
    verified_by:
      - form.min_ligament_ok
      - topology.hex_field_present

  - id: swept_grip_bar
    description: round bar swept along a planar arc, solid end to end
    verified_by:
      - topology.bar_follows_arc
      - topology.single_connected_solid

  - id: ring_band
    description: a revolved band with a real bore — the finger/shaft passes through, verified end to end
    verified_by:
      - form.revolve_profile_clear_of_axis
      - topology.revolve_cavity_open
      - topology.single_connected_solid

  - id: snap_hooks
    description: cantilever snap hooks welded on the part (the flexure pair of a snap lid)
    verified_by:
      - topology.ribs_present

  - id: butt_aligned_split
    description: one long section printed as identical-profile halves aligned by end-face press pins
    verified_by:
      - assembly.butt_pin_ir
      - assembly.no_interference

  - id: snap_on_interface
    description: cantilever snap hooks engage receiver windows with printable flexure strain
    verified_by:
      - assembly.snap_joint_ir
      - assembly.hooks_engage
      - assembly.no_interference

  - id: open_channel
    description: open-topped U-channel with the declared wall kept between slot and outside
    verified_by:
      - form.profile_closed
      - form.wall_thickness

  - id: nut_traps
    description: hex nut pockets over clearance bores, cut flat-to-flat true
    verified_by:
      - topology.hex_field_present
      - topology.bores_open

  - id: heatset_pockets
    description: blind pockets sized from the heatset insert table
    verified_by:
      - topology.pockets_present

  - id: standoffs
    description: PCB standoffs with blind pilots rising from the plate
    verified_by:
      - topology.ribs_present
      - topology.pockets_present

  # -- wall tool mounts pack ---------------------------------------------------

  - id: tool_saddle_ring
    description: C-ring saddle whose bore matches the declared tool diameter plus clearance
    verified_by:
      - form.tool_saddle_radius_ok
      - form.tool_clearance_ok
      - form.retention_angle_ok
      - topology.tool_void_open

  - id: snap_retention_mouth
    description: mouth throat narrower than the tool (retains) yet wide enough to insert it
    verified_by:
      - form.mouth_gap_ok
      - form.retention_angle_ok

  - id: wall_mount_flange
    description: wall flange with both anchors on the centerline, reachable by a driver
    verified_by:
      - form.mount_hole_positions_ok
      - form.holes_within_outline
      - form.screw_access_clear

  - id: counterbored_anchor_holes
    description: open anchor bores with recessed heads on the front face
    verified_by:
      - topology.screw_holes_open
      - topology.countersinks_present

  - id: saddle_buttress_ribs
    description: ring fused into the flange with gusset ribs bridging the load path
    verified_by:
      - form.ribs_connect_saddle_to_flange
      - topology.ribs_present

  # -- biomorphic pack (docs/BIOMORPHIC.md). The topology.* entries below
  # are implemented in Bio-3: until then these features stay honestly
  # supported-but-not-built — mark_built requires ALL verified_by to pass.
  - id: biomorphic_exoskeleton
    description: >
      load-aware organic rib network grown over a functional core's
      exoskeleton panel — a validator-backed structural skin, not decoration
    verified_by:
      - form.rib_graph_connected
      - form.rib_roots_touch_substrate
      - form.min_rib_diameter_ok
      - topology.exoskeleton_ribs_materialized

  - id: organic_windows
    description: >
      organic lightening windows between exoskeleton ribs, keepout-safe
      with a guaranteed minimum ligament
    verified_by:
      - form.windows_inside_safe_regions
      - form.min_ligament_ok
      - topology.organic_windows_open

  - id: load_path_ribs
    description: >
      ribs routed along a declared load path (shared structural feature:
      workshop cores spell it as gussets, the bio pack as organic struts)
    verified_by:
      - form.rib_graph_connected
      - form.no_rib_islands
      - topology.exoskeleton_ribs_materialized

  - id: split_branch_clamp
    description: >
      two-half clamp for a branch/pipe — open saddles meeting at a bolted
      mating plane, never a closed hole around the branch
    verified_by:
      - form.saddle_geometry_ok
      - assembly.screw_joint_ir
      - assembly.no_interference

  - id: branch_saddle
    description: open semicircular saddle notch sized to the nominal branch
    verified_by:
      - form.saddle_geometry_ok
      - topology.cavity_open

  - id: three_point_tpu_contact
    description: >
      three flat recessed pad lands across the assembled saddle pair —
      three-point contact by construction, holding glued TPU strips
    verified_by:
      - form.pad_lands_present

  - id: axial_cable_channel
    description: through cable channel along the clamp axis, open both ends
    verified_by:
      - form.clamp_channel_clear
      - topology.bores_open

  - id: dovetail_rail
    description: male dovetail rail in the extruded section, top wider than root
    verified_by:
      - form.dovetail_rail_profile
      - topology.rail_present

  - id: compression_clamp_interface
    description: >
      bolted split clamp that never closes fully — the declared compression
      gap survives into the assembled pose
    verified_by:
      - assembly.screw_joint_ir
      - assembly.clamp_gap_ir
      - assembly.screw_axes_clear
      - assembly.no_interference

  # -- wearable pack (wave P2, docs/ROADMAP.md line P) ---------------------

  - id: body_cradle_fit
    description: >
      the cavity is the measured limb circle plus the declared skin
      clearance, with a mouth inside the donning window — a cuff that
      actually fits the body_fit block, not a pipe clamp renamed
    verified_by:
      - form.body_clearance_ok
      - form.arm_mouth_dons_ok
      - topology.cavity_open

  - id: strap_mount
    description: >
      through strap-slot pairs in the closure tabs — the strap threads
      down, under the bar, up, and never cuts toward the skin
    verified_by:
      - form.strap_access_ok
      - form.cuts_respect_keepouts
      - topology.cutout_present

  - id: skin_safe_edges
    description: every body-contact edge joint carries a comfort fillet
    verified_by:
      - form.comfort_edge_radius_ok

  - id: tpu_pad_recesses
    description: >
      recessed flat lands in the body saddle for glued TPU/foam pads —
      recess goes OUTWARD, a pad pocket, never a pressure ridge
    verified_by:
      - form.pad_recess_exists

  - id: cylindrical_payload_clamp
    description: >
      snap C-clip payload seat riding OUTSIDE the body ring, mouth away
      from the skin, with measured arc retention
    verified_by:
      - form.payload_retention_ok
      - form.payload_mount_not_on_skin_side
      - topology.payload_void_open

  # -- vertical farm pack v1 (docs/VERTICAL_FARM_PACK.md) --------------------

  - id: sloped_water_channel
    description: >
      open U-channel falling 1.0-1.5 deg toward the outlet inside a level
      body — transient pulse transport, monotonic by construction, exits
      through both faces
    verified_by:
      - form.water_channel_slope_ok
      - form.water_channel_dims_ok
      - topology.water_channel_open
      - topology.water_channel_floor_solid

  - id: overflow_drip_edge
    description: >
      sharp overflow lip over an air-gap undercut — water detaches as
      droplets instead of wicking down the outer wall
    verified_by:
      - form.overflow_lip_geometry_ok
      - topology.overflow_relief_open

  - id: open_drip_receiver
    description: >
      the relief void under the lip stays an open, visually inspectable
      drop zone — never a second trough, never standing water
    verified_by:
      - form.no_secondary_water_channel
      - form.no_standing_water_ir

  - id: cassette_seat
    description: >
      recessed drop-in seat matching the shared cassette envelope with
      the declared clearance, floor on the channel entry plane
    verified_by:
      - form.cassette_seat_fit_ok

  - id: module_alignment_edges
    description: >
      tongue (+X) / groove (-X) line-alignment interface — positions
      neighbouring modules, carries nothing, seals nothing
    verified_by:
      - form.tongue_groove_profile_ok
      - topology.ribs_present

  - id: aluminum_profile_seat
    description: >
      bottom slots dropping the module onto 2020/3030 aluminum rails,
      tool-free and fully outside the water path
    verified_by:
      - form.profile_seat_dry_ok
      - topology.cutout_present

  - id: substrate_mesh_floor
    description: >
      flat orthogonal through-mesh across the cassette floor — holds coco,
      aerates roots, directs no flow
    verified_by:
      - form.mesh_floor_orthogonal_ok
      - form.min_ligament_ok
      - topology.hex_field_present

  - id: pulse_contact_window
    description: >
      localized lowered window reaching 1-2 mm into the channel's upper
      zone — substrate touches pulse water only, drained water never
    verified_by:
      - form.contact_window_geometry_ok
      - topology.contact_window_present

  - id: tool_free_removal
    description: finger notches through the rim — lifts out by hand
    verified_by:
      - form.lift_access_ok
      - topology.cutout_present

  - id: cleanable_snap_interface
    description: >
      every snap pocket pierces its wall — open both sides, brushable,
      no hidden wet cavity
    verified_by:
      - form.snap_pockets_cleanable

  # Cassette Interface Standard: the assembly-level contract ANY cassette
  # archetype must satisfy against the rail. The frame-key contract:
  # rail publishes seat_u0/v0/u1/v1, seat_floor_z, seat_depth,
  # channel_center_x/top_z/floor_z_inlet/floor_z_outlet; the cassette
  # publishes cassette_u0/v0/u1/v1, cassette_h, floor_bottom_z,
  # window_cx/window_w/window_floor_z. Verified in the assembled pose.
  - id: vertical_farm_cassette_interface
    description: >
      the cassette drops into the rail seat within the clearance band,
      lifts out by hand, and its contact window rides over the channel in
      pulse-only reach — the machine-checked half of the Cassette
      Interface Standard
    verified_by:
      - assembly.removable_insert_ir
      - assembly.no_interference

  - id: module_line_interface
    description: >
      adjacent modules align on tongue/groove at the grid pitch with
      channel centerlines continuous — a line, not a seal
    verified_by:
      - assembly.tongue_groove_ir
      - assembly.no_interference

  - id: snapped_retainer
    description: >
      the retainer frame clicks onto the cassette with printable flexure
      strain and real lip engagement
    verified_by:
      - assembly.snap_joint_ir
      - assembly.hooks_engage

  # -- wave A1: swappable payload interfaces -------------------------------

  - id: swappable_payload_socket
    description: >
      female dovetail crown on the cuff — payload adapters slide in along
      the arm axis; the cuff never changes when the payload does
    verified_by:
      - form.dovetail_socket_profile_ok
      - interface.frame_exists
      - interface.keepouts_preserved

  - id: dovetail_mount_foot
    description: >
      male dovetail foot measured against the socket standard — wide end
      free (lift-out retention), flanks in the sliding band
    verified_by:
      - form.dovetail_foot_profile_ok
      - interface.frame_exists

  - id: accessory_plate
    description: flat adapter head with a real through-hole pattern
    verified_by:
      - topology.bores_open

  - id: swappable_payload_interface
    description: >
      the adapter foot rides the cuff socket in the sliding band, retained
      against lift-out, mated through DECLARED typed ports with no orphan
      required port — the machine-checked half of the adapter standard
    verified_by:
      - assembly.dovetail_ir
      - interface.mate_compatible
      - assembly.no_orphan_ports
      - assembly.no_interference
