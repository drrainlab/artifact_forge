schema: archetype/v1
id: custom_stamp_v1
version: 1
object_class: custom_stamp
description: >
  Custom stamp: a die plate carrying MIRRORED text relief (the op
  refuses an unmirrored die — the impression must read forwards) under
  a revolved grip knob. Ink pads, clay and leather take the same die at
  different relief depths — presets live as examples. v1 renders text
  from one bundled font; SVG relief waits on a path-to-polygon
  dependency.

provides_features:
  - mounting_plate_body
  - mirrored_stamp_die

parameters:
  stamp_text:
    {type: string, default: FORGE, role: functional, exposed: true,
     description: the text the stamp prints (rendered mirrored on the die)}
  die_l:
    {type: length, default: 60mm, min: 20mm, max: 140mm, role: functional, exposed: true}
  die_w:
    {type: length, default: 25mm, min: 12mm, max: 80mm, role: functional, exposed: true}
  die_t:
    {type: length, default: 6mm, min: 4mm, max: 12mm, role: structural}
  corner_r:
    {type: length, default: 4mm, min: 1mm, max: 12mm, role: aesthetic}
  text_size:
    {type: length, default: 10mm, min: 6mm, max: 40mm, role: functional, exposed: true}
  relief_depth:
    {type: length, default: 1.6mm, min: 0.8mm, max: 4mm, role: functional}
  grip_d:
    {type: length, default: 30mm, min: 18mm, max: 60mm, role: functional}
  grip_h:
    {type: length, default: 25mm, min: 12mm, max: 60mm, role: functional}

constraints:
  - text_size < die_w
  - grip_d < die_w + 20

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    - op: rounded_plate
      id: die
      params: {l: die_l, w: die_w, t: die_t, corner_r: corner_r}
    - op: standoff_pattern
      id: grip
      params: {sx: "expr(grip_d * 0.35)", sy: "expr(min(grip_d * 0.35, die_w * 0.3))",
               boss: "expr(grip_d * 0.3)", height: grip_h,
               pilot_d: 3mm, pilot_depth: 4mm}
    - op: text_emboss
      id: legend
      params: {text: stamp_text, size: text_size, depth: relief_depth,
               mode: emboss, mirror: "yes", duty: stamp,
               face: bottom, rotate: 0}

regions:
  - {id: die, role: mounting_surface, editable: false,
     label: die plate, aliases: [die, stamp face]}

surface_style: molded_utility_part

catalog:
  domain: craft
  modes: [utility]
  tags: [stamp, text, leather, clay, ink]

validators:
  - form.min_stroke_width_ok
  - form.stamp_mirrored_ok
  - form.holes_within_outline
  - topology.text_relief_present
  - topology.ribs_present
  - topology.pockets_present
  - topology.single_connected_solid

forbidden_forms: []

allowed_modifiers: []

contract:
  must_have:
    - mounting_plate_body
    - mirrored_stamp_die
  must_not_have: []
  invariants:
    - text_size < die_w
