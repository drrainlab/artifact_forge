schema: archetype/v1
id: camera_rod_clamp_upper_v1
version: 1
object_class: camera_rod_clamp
description: >
  Upper half of the split rod clamp for camera / light / mic rigs,
  modeled mating-face-down. Open saddle over the rod, one apex TPU pad
  land (three-point contact with the lower pair), four counterbored
  bolt holes through the wings, an axial cable channel above the saddle
  (a lav or power line runs along the rod), and a REAL dovetail rail on
  top — the accessory side: plates, cold-shoe adapters and payload
  sockets slide on and fix into the rail_fix inserts. NOTE: like
  branch_clamp_upper_v1, this deliberately does NOT subscribe
  form.cuts_respect_keepouts — the rail_fix bolt-column keepouts veto
  FUTURE cuts, while the builder's own channel predates them.

maturity: sandbox_buildable

provides_features:
  - split_branch_clamp
  - branch_saddle
  - three_point_tpu_contact
  - axial_cable_channel
  - dovetail_rail
  - hole_pattern
  - heatset_pockets

parameters:
  rod_d:
    {type: length, default: 15mm, min: 10mm, max: 45mm,
     role: functional, exposed: true}
  clamp_w:
    {type: length, default: 32mm, min: 30mm, max: 80mm,
     role: structural, exposed: true}
  compression_gap:
    {type: length, default: 2mm, min: 1.5mm, max: 4mm, role: functional}
  screw:
    {type: choice, choices: [M4, M5, 1/4-20], default: M5, role: assembly,
     description: clamp bolts (counterbored clearance holes in this half)}
  flange_t:
    {type: length, default: 8mm, min: 8mm, max: 12mm, role: structural}
  wall:
    {type: length, default: 3.5mm, min: 3mm, max: 6mm, role: structural}
  bolt_web:
    {type: length, default: 7mm, min: 0mm, max: 14mm, role: structural}
  edge_m:
    {type: length, default: 8mm, min: 6mm, max: 14mm, role: structural}
  corner_r:
    {type: length, default: 2mm, min: 1mm, max: 4mm, role: aesthetic}
  land_angle:
    {type: number, default: 50, min: 30, max: 65, role: functional}
  land_w:
    {type: length, default: 8mm, min: 5mm, max: 14mm, role: functional}
  pad_recess:
    {type: length, default: 0.8mm, min: 0.6mm, max: 1.5mm, role: functional}
  top_t:
    {type: length, default: 16mm, min: 10mm, max: 26mm, role: structural,
     description: body above the saddle apex — carries the cable channel}
  rail_w:
    {type: length, default: 16mm, min: 12mm, max: 26mm, role: functional,
     exposed: true, description: dovetail top width (the accessory side)}
  rail_h:
    {type: length, default: 5mm, min: 4mm, max: 8mm, role: functional}
  rail_angle:
    {type: number, default: 10, min: 0, max: 20, role: functional}
  channel_d:
    {type: length, default: 6mm, min: 4mm, max: 10mm, role: functional,
     exposed: true, description: axial cable channel diameter}
  rail_screw:
    {type: choice, choices: [M3, M4], default: M3, role: assembly}
  rail_fix_depth:
    {type: length, default: 5mm, min: 5mm, max: 8mm, role: assembly}
  min_web:
    {type: length, default: 3mm, min: 3mm, max: 6mm, role: manufacturing}

derived:
  saddle_r: rod_d / 2
  saddle_apex: saddle_r - compression_gap / 2
  channel_z: saddle_apex + 3 + channel_d / 2
  body_h: saddle_apex + top_t
  rail_top_z: body_h + rail_h
  bolt_y: saddle_r + bolt_web
  bolt_dx: clamp_w - 16

constraints:
  - compression_gap >= 1.5
  - rail_top_z - rail_fix_depth - channel_z - channel_d / 2 >= 2

form:
  type: recipe
  section: recipe
  plane: YZ
  width_axis: X
  ops:
    - op: clamp_half_upper
      id: body
      params:
        branch_d: rod_d
        clamp_w: clamp_w
        gap: compression_gap
        flange_t: flange_t
        bolt_y: bolt_y
        edge_m: edge_m
        wall: wall
        corner_r: corner_r
        land_angle: land_angle
        land_w: land_w
        pad_recess: pad_recess
        top_t: top_t
        rail_w: rail_w
        rail_h: rail_h
        rail_angle: rail_angle
    - op: counterbore_hole_pattern
      id: bolts_a
      params:
        kind: line
        screw: screw
        count: 2
        spacing: bolt_dx
        cx: "expr(clamp_w / 2)"
        cy: bolt_y
        cs_face: top
        z_top: flange_t
        through: flange_t
    - op: counterbore_hole_pattern
      id: bolts_b
      params:
        kind: line
        screw: screw
        count: 2
        spacing: bolt_dx
        cx: "expr(clamp_w / 2)"
        cy: "expr(-bolt_y)"
        cs_face: top
        z_top: flange_t
        through: flange_t
    - op: axial_channel
      id: cable_channel
      params:
        d: channel_d
        y: 0mm
        z: channel_z
    - op: heatset_insert_pocket
      id: rail_fix
      params:
        screw: rail_screw
        depth: rail_fix_depth
        spacing: bolt_dx
        cx: "expr(clamp_w / 2)"
        cy: 0mm
        z_top: rail_top_z

regions:
  - {id: saddle_contact, role: soft_contact_surface, editable: false,
     label: "Rod contact saddle",
     description: "the open half-circle over the rod with the apex TPU pad
       land — never cut"}
  - {id: outer_shell, role: exoskeleton_panel, editable: true,
     label: "Outer shell",
     aliases: [outer surface, shell]}
  - {id: rail_interface, role: mounting_surface, editable: false,
     label: "Dovetail rail",
     description: "the male dovetail accessories slide onto"}

surface_style: molded_utility_part

catalog:
  domain: cinema
  modes: [cinema_prop, engineering]
  tags: [rod, 15mm, clamp, rig, rail]

interfaces:
  - id: clamp_mate
    type: heatset_insert_pattern
    gender: male
    datum: clamp_mate
    frame: {normal: "-Z", up: "+Y"}
    accepts: [camera_rod_clamp]

validators:
  - interface.frame_exists
  - interface.frame_orthonormal
  - interface.normal_points_outward
  - interface.up_consistent
  - form.saddle_geometry_ok
  - form.pad_lands_present
  - form.dovetail_rail_profile
  - form.clamp_channel_clear
  - form.min_web_between_holes
  - form.holes_within_outline
  - topology.cavity_open
  - topology.single_connected_solid
  - topology.rail_present
  - topology.screw_holes_open
  - topology.countersinks_present
  - topology.bores_open
  - topology.pockets_present
  - region.keepouts_preserved

forbidden_forms: []

allowed_modifiers:
  - fillet_soften

contract:
  must_have:
    - branch_saddle
    - three_point_tpu_contact
    - axial_cable_channel
    - dovetail_rail
  must_not_have:
    - closed_branch_hole_without_split
    - weak_saddle_contact
    - blocked_cable_channel
    - perforated_bolt_boss
  invariants:
    - compression_gap >= 1.5
    - bolt_dx >= 12
