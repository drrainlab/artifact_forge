schema: archetype/v1
id: custom_stamp_svg_v1
version: 1
object_class: custom_stamp
description: >
  Custom SVG stamp: a die plate carrying a MIRRORED SVG relief (paste
  the path data — closed, hole-free subpaths; the narrowest feature is
  measured against the nozzle, never hoped) under a pillar grip. The
  text sibling is custom_stamp_v1; holes (an O's counter) wait for the
  hole-subtraction iteration.

provides_features:
  - mounting_plate_body
  - mirrored_svg_die

parameters:
  svg_path:
    {type: string, default: "M 0 0 L 20 0 L 20 6 L 12 6 L 12 20 L 8 20 L 8 6 L 0 6 Z",
     role: functional, exposed: true,
     description: "SVG path data (d attribute) — closed subpaths, no holes"}
  die_l:
    {type: length, default: 60mm, min: 20mm, max: 140mm, role: functional, exposed: true}
  die_w:
    {type: length, default: 40mm, min: 16mm, max: 100mm, role: functional, exposed: true}
  die_t:
    {type: length, default: 6mm, min: 4mm, max: 12mm, role: structural}
  corner_r:
    {type: length, default: 4mm, min: 1mm, max: 12mm, role: aesthetic}
  motif_w:
    {type: length, default: 30mm, min: 8mm, max: 120mm, role: functional, exposed: true,
     description: the rendered motif's target width on the die}
  relief_depth:
    {type: length, default: 1.6mm, min: 0.8mm, max: 4mm, role: functional}
  grip_h:
    {type: length, default: 25mm, min: 12mm, max: 60mm, role: functional}

constraints:
  - motif_w < die_l
  - motif_w < die_l - 4

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    - op: rounded_plate
      id: die
      params: {l: die_l, w: die_w, t: die_t, corner_r: corner_r}
    - op: standoff_pattern
      id: grip
      params: {sx: "expr(die_l * 0.3)", sy: "expr(die_w * 0.3)",
               boss: 9mm, height: grip_h, pilot_d: 3mm, pilot_depth: 4mm}
    - op: svg_relief
      id: motif
      params: {path: svg_path, width: motif_w, depth: relief_depth,
               mode: emboss, mirror: "yes", duty: stamp,
               face: bottom, rotate: 0}

regions:
  - {id: die, role: mounting_surface, editable: false,
     label: die plate, aliases: [die, stamp face]}

surface_style: molded_utility_part

catalog:
  domain: craft
  modes: [utility]
  tags: [stamp, svg, logo, leather, clay]

validators:
  - form.svg_relief_printable
  - form.stamp_mirrored_ok
  - form.holes_within_outline
  - topology.text_relief_present
  - topology.ribs_present
  - topology.pockets_present
  - topology.single_connected_solid

forbidden_forms: []

allowed_modifiers: []

contract:
  must_have:
    - mounting_plate_body
    - mirrored_svg_die
  must_not_have: []
  invariants:
    - motif_w < die_l
