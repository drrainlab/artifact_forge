schema: archetype/v1
id: enclosure_base_snap_v1
version: 1
object_class: electronics_enclosure
description: >
  Enclosure base for a SNAP-ON lid (pure recipe): the R2 shell plus
  receiver windows through both X walls — no screws, the lid's cantilever
  hooks click in. Window position chains from the shared hook dimensions
  and the snap_joint verifies undercut and flexure strain before any CAD.

provides_features:
  - box_shell
  - pass_through_cutout

parameters:
  box_l:
    {type: length, default: 82mm, min: 40mm, max: 200mm,
     role: functional, exposed: true}
  box_w:
    {type: length, default: 52mm, min: 30mm, max: 160mm,
     role: functional, exposed: true}
  box_h:
    {type: length, default: 26mm, min: 12mm, max: 80mm,
     role: functional, exposed: true}
  wall:
    {type: length, default: 2.4mm, min: 1.6mm, max: 5mm, role: manufacturing}
  floor_t:
    {type: length, default: 3mm, min: 2mm, max: 6mm, role: manufacturing}
  corner_r:
    {type: length, default: 6mm, min: 2mm, max: 14mm, role: aesthetic}
  port_z:
    {type: length, default: 12mm, min: 6mm, max: expr(box_h - 5),
     role: functional, exposed: true}
  port:
    {type: choice, choices: [usb_c, micro_usb, usb_a, hdmi, audio_35, sd, barrel_55],
     default: usb_c, role: functional}
  # -- snap receiver windows (match the lid's hook chain via shared) -----
  hook_w:
    {type: length, default: 8mm, min: 5mm, max: 16mm, role: assembly}
  lip_h:
    {type: length, default: 3mm, min: 2mm, max: 5mm, role: assembly}
  plug_depth:
    {type: length, default: 3.5mm, min: 2mm, max: 8mm, role: assembly}
  hook_len:
    {type: length, default: 9mm, min: 6mm, max: 18mm, role: assembly}

constraints:
  - floor_t + 2 < box_h
  - hook_len + 4 < box_h

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    - op: rounded_box_shell
      id: shell
      params: {l: box_l, w: box_w, h: box_h, wall: wall, floor_t: floor_t,
               corner_r: corner_r}
    - op: port_cutout
      id: port
      params: {port: port, face: "+y", z: port_z}
    # window top = where the flipped lid's lip top lands: the lip rides
    # plug_depth + hook_len below the lid plate, minus its own height
    - op: snap_window_pair
      id: snap_window
      params: {w: "expr(hook_w + 0.8)", h: "expr(lip_h + 0.8)",
               top_offset: "expr(plug_depth + hook_len - lip_h - 0.4)"}

regions:
  - {id: shell, role: mounting_surface, editable: false}
  - {id: floor, role: aesthetic_lightening, editable: true}

surface_style: molded_utility_part

validators:
  - form.shell_walls_ok
  - form.cuts_respect_keepouts
  - topology.single_connected_solid
  - topology.cutout_present

forbidden_forms: []

allowed_modifiers:
  - add_grid_slot_field
  - add_hex_perforation
  - fillet_soften

contract:
  must_have:
    - box_shell
    - pass_through_cutout
  must_not_have: []
  invariants:
    - hook_len + 4 < box_h
