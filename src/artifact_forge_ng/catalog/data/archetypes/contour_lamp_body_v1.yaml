schema: archetype/v1
id: contour_lamp_body_v1
version: 1
object_class: contour_lamp_body
description: >
  Round wall lamp body — a cylindrical light chamber whose front face
  takes a snap-on contour panel (the glowing SVG silhouette lives on the
  contour_lamp_face_v1 sibling). Inside: the LED strip sticks around the
  inner wall, a boss pair holds the driver/controller, a barrel/USB
  power jack exits through the wall, and the back carries an opt-in
  countersunk wall-mount stack. Visual hierarchy by design: the light
  image first, the mount second, the electronics hidden.

provides_features:
  - box_shell
  - screw_bosses
  - pass_through_cutout
  - led_light_chamber

parameters:
  lamp_d:
    {type: length, default: 140mm, min: 90mm, max: 200mm,
     role: functional, exposed: true,
     description: lamp outer diameter — the face panel matches it}
  depth:
    {type: length, default: 24mm, min: 16mm, max: 40mm,
     role: functional, exposed: true,
     description: chamber depth — LED-to-membrane distance sets the glow
       softness}
  wall:
    {type: length, default: 3mm, min: 2.4mm, max: 5mm, role: manufacturing}
  floor_t:
    {type: length, default: 3mm, min: 2.4mm, max: 6mm, role: manufacturing}
  power_port:
    {type: choice, choices: [barrel_55, usb_c], default: barrel_55,
     role: functional, exposed: true,
     description: power inlet through the wall (12V barrel or USB-C)}
  port_z:
    {type: length, default: 10mm, min: 6mm, max: "expr(depth - 6)",
     role: functional}
  # -- snap family (share with the face panel via assembly.shared) --
  plug_depth:
    {type: length, default: 4mm, min: 3mm, max: 8mm, role: assembly}
  hook_w:
    {type: length, default: 8mm, min: 5mm, max: 16mm, role: assembly}
  hook_len:
    {type: length, default: 10mm, min: 6mm, max: 18mm, role: assembly}
  lip_h:
    {type: length, default: 3mm, min: 2mm, max: 5mm, role: assembly}
  # -- driver/controller boss pair on the back floor --
  psu_sx:
    {type: length, default: 40mm, min: 20mm, max: "expr(lamp_d - 60)",
     role: assembly,
     description: LED driver / controller mount boss spacing (zip-tie or
       screw the brick to psu_pilot_*)}
  # -- opt-in wall-mount stack (0 = none): screws through the back --
  mount_holes:
    {type: count, default: 0, min: 0, max: 2, role: assembly, exposed: true,
     description: countersunk back holes (0 = none) — the lamp screws
       flat onto a wall or a carrier's boss line}
  mount_span:
    {type: length, default: 80mm, min: 30mm, max: "expr(lamp_d - 40)",
     role: assembly}
  mount_cy:
    {type: length, default: 0mm, min: -60mm, max: 60mm, role: assembly}
  mount_screw:
    {type: choice, choices: [M3, M4], default: M4, role: assembly}

constraints:
  - depth > plug_depth + hook_len + 4
  - psu_sx < lamp_d - 2 * wall - 20

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    # corner_r = lamp_d/2 turns the rounded shell into a CYLINDER — the
    # interior cavity is the light chamber, its inner wall the LED track
    - op: rounded_box_shell
      id: shell
      params: {l: lamp_d, w: lamp_d, h: depth, wall: wall, floor_t: floor_t,
               corner_r: "expr(lamp_d / 2)"}
    - op: port_cutout
      id: power
      params: {port: power_port, face: "+y", z: port_z}
    - op: snap_window_pair
      id: snap_window
      params: {w: "expr(hook_w + 0.8)", h: "expr(lip_h + 0.8)",
               top_offset: "expr(plug_depth + hook_len - lip_h - 0.4)"}
    - op: boss_pattern
      id: psu
      params: {sx: psu_sx, sy: 20mm, boss: 7mm, height: 6mm,
               pilot_d: 4mm, pilot_depth: 5mm, corners: 2}
    - op: countersunk_hole_pattern
      id: mount
      params: {kind: line, screw: mount_screw, count: mount_holes,
               spacing: mount_span, cy: mount_cy, cs_face: top,
               z_top: floor_t, through: floor_t}
    - op: publish_datum
      id: base
      params: {x: 0mm, y: 0mm, z: 0mm}

regions:
  - {id: shell, role: mounting_surface, editable: false,
     label: chamber wall}
  - {id: floor, role: aesthetic_lightening, editable: true,
     label: back plate, aliases: [back, задняя стенка],
     description: the lamp's BACK — hex perforation here doubles as
       driver ventilation}

datums:
  - id: rim
    description: chamber rim — the contour face panel seats here
    mates: [lid_seat, snap_joint]
  - id: base
    description: back underside center — the lamp sits flat on a wall or
      a carrier's boss tops (opt-in mount_holes stack)
    mates: [screw_joint]
  - id: psu_top
    description: driver/controller boss-top plane inside the chamber
      (pilots psu_pilot_*)
    mates: [screw_joint]

catalog:
  domain: lighting
  modes: [utility]
  tags: [lamp, light, led, contour, silhouette, ring, wall, night]
  search_aliases: [светильник, ночник, бра, лампа настенная]
  use_cases: [wall accent light, workshop sign light, kids night light]

validators:
  - form.shell_walls_ok
  - form.cuts_respect_keepouts
  - form.min_web_between_holes
  - form.holes_within_outline
  - form.datums_within_outline
  - topology.screw_holes_open
  - topology.countersinks_present
  - topology.single_connected_solid
  - topology.cutout_present
  - topology.ribs_present
  - topology.pockets_present

forbidden_forms: []

allowed_modifiers:
  - add_hex_perforation
  - fillet_soften

contract:
  must_have:
    - box_shell
    - led_light_chamber
