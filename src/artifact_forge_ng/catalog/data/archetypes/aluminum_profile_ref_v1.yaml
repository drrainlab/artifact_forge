schema: archetype/v1
id: aluminum_profile_ref_v1
version: 2
object_class: hardware_reference
maturity: sandbox_buildable
description: >
  Vertical Farm Pack (tilted flush row canon): aluminum profile carrier
  REFERENCE GEOMETRY — and after the VF correction the model is LITERALLY
  TRUE: a standard straight 2020/3030 extrusion, cut to length, modeled
  straight and horizontal. The physical row slope (1.0-2.0 deg) lives
  ONLY in the assembly's mount_context — the whole row, profiles
  included, is mounted tilted by the frame; nothing is milled, nothing is
  wedge-cut, no surrogate geometry remains. Instances use
  manufacturing.process: reference (external hardware: no FDM checks,
  exported STL/STEP are visual references only). Stations along the flat
  top mark where each rail's bottom groove ceiling lands (flush pitch =
  module_w + face_gap); profile_perch joints verify the local seat fit,
  assembly.profile_support_full_length verifies FULL seating — span gap
  zero — in global poses.

provides_features: []

parameters:
  size:
    {type: choice, choices: ["2020", "3030"], default: "2020",
     role: assembly, exposed: true,
     description: standard aluminum extrusion series}
  length:
    {type: length, default: 640mm, min: 200mm, max: 2000mm,
     role: assembly, exposed: true,
     description: cut-to-length of the standard straight profile}
  module_w:
    {type: length, default: 205mm, min: 200mm, max: 250mm, role: assembly,
     description: shared rail module depth}
  face_gap:
    {type: length, default: 0.4mm, min: 0.3mm, max: 0.6mm, role: assembly,
     description: "shared controlled face gap — stations march at the
       flush pitch (module_w + face_gap)"}
  stations:
    {type: count, default: 3, min: 1, max: 8, role: assembly,
     description: how many rail cells this carrier serves}
  station_edge:
    {type: length, default: 20mm, min: 5mm, max: 60mm, role: assembly,
     description: first station inset from the profile's high end}

derived:
  # Stations march at the FLUSH pitch — the same module_w + face_gap the
  # lap joints enforce; a carrier that fights the row is unrepresentable.
  station_pitch: module_w + face_gap

constraints:
  - length >= station_edge + (stations - 1) * (module_w + face_gap) + 8

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    - op: profile_ref_body
      id: profile
      params:
        size: size
        length: length
        slope_deg: 0.0
        station_pitch: station_pitch
        stations: stations
        station_edge: station_edge

regions:
  - {id: profile_body, role: mounting_surface, editable: false,
     label: "Profile body (reference)"}

surface_style: molded_utility_part

interfaces:
  - id: ridge_1
    type: profile_seat
    gender: male
    datum: station_1
    accepts: [water_rail]
    # axis = along the profile / the flow; water still travels -Y
    frame: {normal: "+Z", up: "+Y", axis: "-Y"}
  - id: ridge_2
    type: profile_seat
    gender: male
    datum: station_2
    accepts: [water_rail]
    frame: {normal: "+Z", up: "+Y", axis: "-Y"}
  - id: ridge_3
    type: profile_seat
    gender: male
    datum: station_3
    accepts: [water_rail]
    frame: {normal: "+Z", up: "+Y", axis: "-Y"}

validators:
  - interface.frame_exists
  - interface.frame_orthonormal
  - interface.normal_points_outward
  - interface.up_consistent
  - interface.keepouts_preserved
  - form.profile_ref_geometry_ok
  - topology.single_connected_solid

forbidden_forms: []

allowed_modifiers: []

contract:
  must_have: []
  must_not_have: []
  invariants:
    - face_gap >= 0.3 and face_gap <= 0.6
