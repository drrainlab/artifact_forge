schema: archetype/v1
id: cup_holder_post_v1
version: 1
object_class: cup_holder
description: >
  SCREWLESS cup holder for a square wooden post: a LOW ring-wall cup
  (just enough rim to keep a mug standing; spills drain through the
  raised floor) with a snap C-clip welded to its outer wall. Push the
  holder onto the post from the front — the flexing side walls ride
  over the far corners and the chamfered lips snap shut; the cup's own
  weight presses the post into the flat seat, so nothing else is
  needed. 2x2 cm post by default, any 12-30 mm square by parameter.

provides_features:
  - pot_vessel
  - drainage_bores
  - square_post_clamp

parameters:
  cup_d:
    {type: length, default: 92mm, min: 60mm, max: 130mm, role: functional, exposed: true,
     description: "inner rim sized to drop a mug in (92 fits most mugs)"}
  bottom_d:
    {type: length, default: 80mm, min: 50mm, max: 120mm, role: functional}
  cup_h:
    {type: length, default: 38mm, min: 26mm, max: 80mm, role: functional, exposed: true,
     description: "LOW ring wall — holds the cup, never hides it"}
  wall:
    {type: length, default: 2.4mm, min: 1.8mm, max: 4mm, role: structural}
  floor_t:
    {type: length, default: 3mm, min: 2mm, max: 5mm, role: structural}
  floor_raise:
    {type: length, default: 4mm, min: 2mm, max: 10mm, role: functional}
  drain_count:
    {type: count, default: 3, min: 1, max: 6, role: functional}
  drain_d:
    {type: length, default: 6mm, min: 4mm, max: 10mm, role: functional}
  post_w:
    {type: length, default: 20mm, min: 12mm, max: 24mm, role: assembly, exposed: true,
     description: "the square post's measured side (20 = the 2x2 cm standard)"}
  fit_clearance:
    {type: length, default: 0.5mm, min: 0.3mm, max: 0.9mm, role: manufacturing}
  clip_h:
    {type: length, default: 36mm, min: 18mm, max: 60mm, role: assembly,
     description: snap clip height (>= 1.5x post — anti-rock)}
  clip_z:
    {type: length, default: 1mm, min: 0mm, max: 30mm, role: assembly}
  snap_bite:
    {type: length, default: 1.2mm, min: 0.8mm, max: 2mm, role: assembly}
  clip_wall:
    {type: length, default: 2.8mm, min: 2.4mm, max: 3.6mm, role: structural}

constraints:
  - cup_d >= bottom_d
  - cup_h > floor_raise + floor_t + 10
  - clip_z + clip_h <= cup_h
  - clip_h >= 1.5 * post_w

form:
  type: recipe
  section: recipe_revolve
  plane: XZ
  width_axis: Y
  ops:
    - op: pot_body
      id: cup
      params: {top_d: cup_d, bottom_d: bottom_d, h: cup_h, wall: wall,
               floor_t: floor_t, floor_raise: floor_raise}
    - op: bore_pattern
      id: drains
      params: {kind: bolt_circle, d: drain_d, count: drain_count,
               bc_d: "expr(bottom_d / 2)",
               z_top: "expr(floor_raise + floor_t)", through: floor_t}
    - op: square_post_snap
      id: clip
      params: {post_w: post_w, fit_clearance: fit_clearance,
               clip_h: clip_h, z: clip_z, wall: clip_wall,
               snap_bite: snap_bite, dir: "+x"}

regions:
  - {id: cup_cavity, role: soft_contact_surface, editable: false,
     label: cup seat, aliases: [cavity, cup]}
  - {id: cup_outer_shell, role: aesthetic_lightening, editable: false,
     label: outer wall, aliases: [outer surface]}
  - {id: clip_post_channel, role: mounting_surface, editable: false,
     label: post channel, aliases: [post channel, clip]}

datums:
  - id: axis
    description: cup axis
  - id: post_axis
    description: clamped post axis

surface_style: molded_utility_part

catalog:
  domain: household
  modes: [utility]
  tags: [cup holder, post, balcony, snap, screwless]

validators:
  - form.pot_taper_ok
  - form.pot_floor_drains
  - form.post_sleeve_fit_ok
  - form.post_sleeve_engagement_ok
  - form.post_sleeve_walls_ok
  - form.post_snap_retention_ok
  - form.holes_within_outline
  - topology.bores_open
  - topology.single_connected_solid

forbidden_forms: []

allowed_modifiers: []

contract:
  must_have:
    - pot_vessel
    - drainage_bores
    - square_post_clamp
  must_not_have: []
  invariants:
    - clip_z + clip_h <= cup_h
