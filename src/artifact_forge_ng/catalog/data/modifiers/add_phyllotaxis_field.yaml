schema: modifier/v1
id: add_phyllotaxis_field
category: pattern_field
description: >
  Vogel sunflower-spiral hole field (r = c*sqrt(k), golden-angle steps) —
  the deterministic organic pattern; spacing guarantees the ligament by
  construction and the measured check confirms it.
applies_to: [aesthetic_lightening]
forbidden_targets:
  [fastener_keepout, high_stress_region, soft_contact_surface,
   retaining_flexure, seal_surface, mounting_surface]
params:
  hole_d: {type: length, default: 3mm, min: 1.5mm, max: 10mm}
  count: {type: count, default: 120, min: 10, max: 500}
  min_ligament: {type: length, default: 1.6mm, min: 1.2mm, max: 6mm}
  edge_margin: {type: length, default: 4mm, min: 2mm, max: 16mm}
  cut_mode: {type: choice, choices: [through, recess], default: through}
  recess_depth: {type: length, default: 1.2mm, min: 0.6mm, max: 3mm}
provides_features: [phyllotaxis_field]
validators:
  - form.field_cells_present
  - form.min_ligament_ok
  - region.keepouts_preserved
  - topology.hex_field_present
