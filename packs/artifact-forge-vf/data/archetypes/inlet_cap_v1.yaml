schema: archetype/v1
id: inlet_cap_v1
version: 1
object_class: water_inlet_cap
maturity: sandbox_buildable
description: >
  Vertical Farm Pack (VF-9.2 chute-cap): the Water Inlet Cap — a support-free
  Г-hook whose water path is VISIBLE. The drip line seats in a vertical tube
  socket on a STOP SHOULDER (it cannot be pushed through); a narrower drip
  orifice drops the water through a short covered chamber into an OPEN-TOP
  chute (a U-trough) that carries it inboard and drips it off the nose tip
  onto the rail's floored lip-seat, safely inside the channel (fluid_joint,
  gravity is the pump; the mounted row tilt drains both the level trough and
  the rail channel). No closed horizontal water tunnel, no ambiguous through
  bore (form.cap_water_path_visible); brush-cleanable from above. HOOKS the
  outboard edge of the rail back wall — a short rest ledge on the wall top, an
  outboard leg/foot to the bed — and prints AS-MODELED with no saddle_up flip
  (manufacturing.cap_supportless_verified). Magnets dock on the vertical +Y
  face. assembly.saddle_hang_ir verifies the hang in the fluid pose. Local
  frame: y=0 = the rail back face, -Y inboard toward the channel; z=0 = the
  cap body bottom.

provides_features:
  - hose_takeoff
  - drip_spout
  - endcap_dock

parameters:
  cap_w:
    {type: length, default: 64mm, min: 40mm, max: 120mm,
     role: functional, exposed: true,
     description: cap body width across the corridor}
  cap_h:
    {type: length, default: 22mm, min: 16mm, max: 40mm, role: structural}
  tube_od:
    {type: length, default: 9mm, min: 6mm, max: 13mm,
     role: assembly, exposed: true,
     description: "outer diameter of the silicone feed tube (hardware, BOM)"}
  bore_clearance:
    {type: length, default: 0.4mm, min: 0.2mm, max: 0.8mm, role: manufacturing,
     description: push-in grip over the tube OD}
  socket_depth:
    {type: length, default: 12mm, min: 8mm, max: 14mm, role: functional,
     exposed: true,
     description: "VF-9.2: tube socket depth to the STOP SHOULDER — the tube
       seats there and physically cannot be pushed through the cap"}
  orifice_d:
    {type: length, default: 5mm, min: 4mm, max: 7mm, role: functional,
     exposed: true,
     description: "VF-9.2: the drip orifice below the stop — narrower than
       the tube (the stop is real) yet wide enough not to clog"}
  cassette_w:
    {type: length, default: 177mm, min: 160mm, max: 236mm, role: assembly,
     description: shared cassette envelope — sizes the rail wall the cap hangs on}
  seat_clearance:
    {type: length, default: 0.75mm, min: 0.5mm, max: 1mm, role: assembly}
  module_w:
    {type: length, default: 205mm, min: 200mm, max: 250mm, role: assembly,
     description: shared rail module depth — sizes the rail wall}
  seat_depth:
    {type: length, default: 14mm, min: 10mm, max: 20mm, role: assembly,
     description: shared rail seat depth — positions the handover}
  channel_d:
    {type: length, default: 5mm, min: 4mm, max: 8mm, role: assembly,
     description: shared rail inlet channel depth — positions the handover}
  channel_w:
    {type: length, default: 16mm, min: 12mm, max: 20mm, role: assembly,
     description: shared rail channel width the spout dips into}
  spout_w:
    {type: length, default: 14mm, min: 8mm, max: 18mm, role: functional,
     description: spout tongue width — must fit INSIDE the rail channel}
  saddle_depth:
    {type: length, default: 8mm, min: 6mm, max: 12mm, role: structural}
  saddle_fit:
    {type: length, default: 0.4mm, min: 0.2mm, max: 0.8mm, role: manufacturing}
  corner_r:
    {type: length, default: 3mm, min: 2mm, max: 6mm, role: aesthetic}
  dock_magnets:
    {type: bool, default: false, role: assembly, exposed: true,
     description: "VF-6: dock the cap arm onto the FIRST rail's back wall-top
       magnets (rail needs endcap_dock: back) — alignment only. Keep cap_w
       wide enough that +-dock_x stays inside the arm (64 fits dock_x 22)"}
  dock_x:
    {type: length, default: 22mm, min: 14mm, max: 40mm, role: assembly,
     description: "dock magnet centers at +-dock_x — must match the rail"}
  dock_inset:
    {type: length, default: 7mm, min: 4mm, max: 12mm, role: assembly,
     description: "dock pocket step inboard from the rail face — match the rail"}
  dock_fit:
    {type: length, default: 0.2mm, min: 0.1mm, max: 0.3mm, role: manufacturing,
     description: "diametral press-fit of the d6x2 dock magnet"}

derived:
  # the wall the cap straddles: (module depth - seat span) / 2
  rail_wall_t: (module_w - cassette_w - 2 * seat_clearance) / 2
  # feed-to-wall-top drop: the rail FEED datum (the only surviving fall in
  # the flush row) sits FALL_ENTRY (2.5) above the channel floor; the
  # saddle rests on the wall top (rail body top)
  hang_drop: seat_depth + channel_d - 2.5

constraints:
  - spout_w <= channel_w - 2
  - tube_od + bore_clearance <= spout_w - 3
  - hang_drop > saddle_depth + 1

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    - op: inlet_cap_body
      id: cap
      params:
        cap_w: cap_w
        cap_h: cap_h
        tube_od: tube_od
        bore_clearance: bore_clearance
        socket_depth: socket_depth
        orifice_d: orifice_d
        rail_wall_t: rail_wall_t
        saddle_fit: saddle_fit
        saddle_depth: saddle_depth
        hang_drop: hang_drop
        spout_w: spout_w
        rail_channel_w: channel_w
        corner_r: corner_r
        dock_magnets: dock_magnets
        dock_x: dock_x
        dock_inset: dock_inset
        dock_fit_clearance: dock_fit

regions:
  - {id: spout_path, role: transient_water_path, editable: false,
     label: "Drip path",
     description: the vertical water path — nothing may cut into it}
  - {id: saddle, role: interface_keepout, editable: false,
     label: "Saddle slot"}

surface_style: molded_utility_part

catalog:
  domain: grow
  modes: [fluid_grow, engineering]
  tier: pro
  tags: [inlet, cap]

interfaces:
  - id: rail_out
    type: fluid_outlet
    gender: male
    datum: spout
    assembly_role: required
    accepts: [water_rail]
    # axis = flow direction: the cap hands water -Y into the rail
    frame: {normal: "-Y", up: "+Z", axis: "-Y"}
  - id: tube_in
    type: hose_port
    gender: neutral
    datum: tube_in
    frame: {normal: "+Z", up: "+Y", axis: "+Z"}

validators:
  - interface.frame_exists
  - interface.frame_orthonormal
  - interface.normal_points_outward
  - interface.up_consistent
  - interface.keepouts_preserved
  - form.hose_bore_ok
  - form.spout_drop_path_ok
  - form.cap_water_path_visible
  - form.dock_pockets_dry
  - form.no_standing_water_ir
  - manufacturing.cap_supportless_verified
  - topology.fluid_path_open
  - topology.single_connected_solid
  - topology.cutout_present
  - topology.ribs_present

forbidden_forms: []

allowed_modifiers: []

contract:
  must_have:
    - hose_takeoff
    - drip_spout
  must_not_have:
    - closed_water_reservoir
    - dead_water_pocket
    - hidden_wet_cavity
  invariants:
    - spout_w <= channel_w - 2
    - orifice_d <= tube_od - 2
