schema: archetype/v1
id: water_rail_v1
version: 2
object_class: water_rail
maturity: sandbox_buildable
description: >
  Vertical Farm Pack (tilted flush row canon): the Base Water Rail — a
  level 248x248 module that transports and constrains a transient water
  pulse, never stores it. The open U-channel is cut from the SEAT FLOOR at
  CONSTANT depth: the rail itself is horizontal; the drainage slope comes
  from mounting the whole row on a standard straight 2020/3030 aluminum
  profile at 1.0-2.0 deg (assembly mount_context), never from the geometry.
  Modules sit FLUSH (dZ = 0, controlled 0.3-0.6 face gap) and hand water to
  each other over a lap-flow joint: a lip continuing the channel floor
  plane lands in the neighbour's through open-bottom receiver; the tip slot
  is a deliberate, visible, cleanable leak path — the seam is never the
  primary water path. A recessed drop-in seat carries any cassette honoring
  the Cassette Interface Standard. The body is a lightweight dry shell
  (param-gated): large smooth open-bottom windows between the channel and
  the profile bands — the profile carries the row, plastic pays for water,
  cassette and positioning. Optional sealed magnet pockets in both +-Y
  faces align neighbouring modules and NOTHING else — never a seal, never a
  support. Flow axis Y: inlet back (+Y), outlet front (-Y); prints flat,
  channel up, no supports in the wet path.

provides_features:
  - constant_depth_water_channel
  - lap_flow_handover
  - lightweight_dry_shell
  - cassette_seat
  - module_alignment_edges
  - aluminum_profile_seat
  - endcap_dock

parameters:
  module_l:
    {type: length, default: 205mm, min: 200mm, max: 250mm,
     role: functional, exposed: true,
     description: "outer module size along the line axis X. Default 205 keeps
       the printed rail (~209 with the tongue) well clear of a 256 bed's
       exclusion zones (P1S/X1); raise toward 250 only on a printer with a
       clean edge. ~200 is the design floor — below it the full-width collector
       no longer fits between the root troughs and the profile band"}
  module_w:
    {type: length, default: 205mm, min: 200mm, max: 250mm,
     role: functional, exposed: true,
     description: outer module size along the flow axis Y (see module_l)}
  body_h:
    {type: length, default: 30mm, min: 24mm, max: 60mm, role: structural,
     description: rail body height; the seat and channel nest inside it}
  channel_w:
    {type: length, default: 16mm, min: 12mm, max: 20mm,
     role: functional, exposed: true,
     description: water channel width — wide enough for a brush}
  channel_d:
    {type: length, default: 5mm, min: 4mm, max: 8mm, role: functional,
     description: channel depth — CONSTANT end to end; the mount supplies the slope}
  channel_bottom_r:
    {type: length, default: 1.2mm, min: 0.8mm, max: 2mm, role: manufacturing,
     description: "rounded channel floor corners — cleanable, no crud line"}
  face_gap:
    {type: length, default: 0.4mm, min: 0.3mm, max: 0.6mm,
     role: assembly, exposed: true,
     description: "controlled gap between neighbouring module faces — flush
       means one plane, not contact; row pitch = module_w + face_gap"}
  lip_len:
    {type: length, default: 4mm, min: 3mm, max: 6mm, role: functional,
     description: lap lip protrusion past the outlet face — also the drip
       edge air gap on the last module of a row}
  lip_t:
    {type: length, default: 1.4mm, min: 1.2mm, max: 1.6mm, role: functional,
     description: lap lip thickness — its TOP is the channel floor plane}
  lap_pocket_len:
    {type: length, default: 6mm, min: 5mm, max: 8mm, role: functional,
     description: through open-bottom lap receiver length in the inlet floor}
  lap_side_clearance:
    {type: length, default: 0.4mm, min: 0.3mm, max: 0.5mm, role: manufacturing,
     description: per-side clearance of the neighbour's lip in the receiver}
  cassette_l:
    {type: length, default: 177mm, min: 160mm, max: 236mm, role: assembly,
     description: shared cassette envelope X — the Cassette Interface Standard}
  cassette_w:
    {type: length, default: 177mm, min: 160mm, max: 236mm, role: assembly,
     description: shared cassette envelope Y}
  seat_depth:
    {type: length, default: 14mm, min: 10mm, max: 20mm, role: structural,
     description: how deep the cassette sits in the rail}
  seat_clearance:
    {type: length, default: 0.75mm, min: 0.5mm, max: 1mm, role: assembly,
     description: per-side drop-in clearance around the cassette}
  module_pitch:
    {type: length, default: 207mm, min: 200mm, max: 300mm, role: assembly,
     description: nominal grid pitch between module origins along the LINE axis X}
  corner_r:
    {type: length, default: 4mm, min: 2mm, max: 8mm, role: aesthetic}
  lightweight:
    {type: bool, default: true, role: structural, exposed: true,
     description: "open-skeleton windows on (reversible: false = solid
       slab); through cuts — no bridges by construction; the aluminum
       profile is the structural member"}
  lw_rib:
    {type: length, default: 2mm, min: 1.8mm, max: 3mm, role: structural,
     description: cross-rib width between windows}
  under_cassette:
    {type: choice, choices: ["skeleton", "root_chamber"], default: "skeleton",
     role: structural, exposed: true,
     description: "under-cassette volume: skeleton (-45% plastic, overflow
       drips through) | root_chamber (blind bottom contains overflow +
       open-top root troughs drained forward by the mount) — VF-5"}
  trough_w:
    {type: length, default: 18mm, min: 18mm, max: 40mm, role: functional,
     description: "root trough width (root_chamber) — cassette spans it.
       Default 18 keeps the outer trough clear of the profile band on a ~205
       module so the full-width collector's side wall still fits between them"}
  trough_rib:
    {type: length, default: 6mm, min: 4mm, max: 10mm, role: structural,
     description: rib between root troughs (cassette support)}
  trough_depth:
    {type: length, default: 12mm, min: 8mm, max: 13mm, role: functional,
     description: root trough depth — the root zone; blind bottom below it}
  magnet_enabled:
    {type: bool, default: false, role: assembly, exposed: true,
     description: "optional d6x2 alignment magnets in sealed dry pockets —
       alignment only, never a seal, never a support"}
  magnet_x_offset:
    {type: length, default: 60mm, min: 40mm, max: 106mm, role: assembly,
     description: "magnet pocket centers at +-x_offset on both +-Y faces.
       On a small root_chamber module the solid band between the root troughs
       and the profile is too narrow for a d6 magnet, so sit them OUTSIDE the
       profile band (~95 on a 205 module, between the profile and the rail
       edge) — clear of both the troughs and the profile slot; the magnet
       checks enforce dry"}
  magnet_fit:
    {type: length, default: 0.2mm, min: 0.1mm, max: 0.3mm, role: manufacturing,
     description: "diametral press-fit of the d6x2 magnet in its dry
       pocket — pushes in from the mating face, a drop of CA recommended"}
  endcap_dock:
    {type: choice, choices: ["none", "front", "back", "both"], default: "none",
     role: assembly, exposed: true,
     description: "VF-6 endcap docking magnets on the END(s): front
       (outlet, collector) / back (inlet, cap) / both. Only the terminal
       modules of a row need it — the collector/cap arm docks onto it"}
  endcap_dock_style:
    {type: choice, choices: ["top", "face"], default: "top",
     role: assembly, exposed: true,
     description: "dock pocket placement: top (UP Z pockets on the wall top,
       collector) or face (Y pockets in the end FACE, VF-9 support-free cap
       hook). Match the docking endcap's style"}
  dock_x:
    {type: length, default: 22mm, min: 14mm, max: 40mm, role: assembly,
     description: "dock magnet centers at +-dock_x in the dry perimeter wall
       (clear of channel and root troughs); the endcap uses the same value"}
  dock_inset:
    {type: length, default: 7mm, min: 4mm, max: 12mm, role: assembly,
     description: "dock pocket step inboard from the end face — under the
       endcap arm footprint, ahead of the seat wall"}
  profile:
    {type: choice, choices: ["2020", "3030"], default: "2020",
     role: assembly, exposed: true,
     description: aluminum profile the module drops onto}
  profile_clearance:
    {type: length, default: 0.2mm, min: 0.1mm, max: 0.5mm, role: manufacturing}
  profile_depth:
    {type: length, default: 6mm, min: 4mm, max: 10mm, role: structural}
  profile_inset:
    {type: length, default: 24mm, min: 16mm, max: 60mm, role: assembly,
     description: profile slot centerline distance from the +-X edges}
  tongue_w:
    {type: length, default: 6mm, min: 4mm, max: 10mm, role: assembly}
  tongue_h:
    {type: length, default: 4mm, min: 3mm, max: 8mm, role: assembly}
  tongue_len:
    {type: length, default: 3.6mm, min: 2mm, max: 6mm, role: assembly,
     description: tongue protrusion past the +X face}
  edge_clearance:
    {type: length, default: 0.4mm, min: 0.3mm, max: 0.5mm, role: assembly,
     description: "per-side tongue/groove clearance — aligns, never binds"}
  tongue_z0:
    {type: length, default: 4mm, min: 2mm, max: 12mm, role: assembly}
  tongue_bottom_margin:
    {type: length, default: 0.4mm, min: 0.3mm, max: 1mm, role: assembly,
     description: extra groove depth so the tongue never bottoms}

constraints:
  - body_h - seat_depth - channel_d >= 2
  - cassette_l + 2 * seat_clearance + 16 <= module_l
  - cassette_w + 2 * seat_clearance + 16 <= module_w
  - profile_depth <= body_h - seat_depth - 2
  - lap_pocket_len - (lip_len - face_gap) >= 0.5
  - lap_pocket_len - (lip_len - face_gap) <= 2.5

form:
  type: recipe
  section: recipe
  plane: XY
  width_axis: Z
  ops:
    - op: water_rail_body
      id: body
      params:
        module_l: module_l
        module_w: module_w
        body_h: body_h
        channel_w: channel_w
        channel_d: channel_d
        channel_bottom_r: channel_bottom_r
        cassette_l: cassette_l
        cassette_w: cassette_w
        seat_depth: seat_depth
        seat_clearance: seat_clearance
        module_pitch: module_pitch
        corner_r: corner_r
        face_gap: face_gap
        lightweight: lightweight
        lw_rib: lw_rib
        under_cassette: under_cassette
        trough_w: trough_w
        trough_rib: trough_rib
        trough_depth: trough_depth
        profile: profile
        profile_inset: profile_inset
    - op: lap_outlet_lip
      id: lap_out
      params:
        lip_len: lip_len
        lip_t: lip_t
    - op: lap_inlet_receiver
      id: lap_in
      params:
        pocket_len: lap_pocket_len
        side_clearance: lap_side_clearance
        lip_t: lip_t
    - op: edge_magnet_pockets
      id: magnets
      params:
        enabled: magnet_enabled
        x_offset: magnet_x_offset
        fit_clearance: magnet_fit
    - op: endcap_dock_pockets
      id: dock
      params:
        dock_end: endcap_dock
        dock_style: endcap_dock_style
        dock_x: dock_x
        dock_inset: dock_inset
        fit_clearance: magnet_fit
    - op: profile_seat_slot
      id: profile_slots
      params:
        profile: profile
        clearance: profile_clearance
        depth: profile_depth
        inset: profile_inset
    - op: tongue_groove_edges
      id: edges
      params:
        tongue_w: tongue_w
        tongue_h: tongue_h
        tongue_len: tongue_len
        clearance: edge_clearance
        z0: tongue_z0
        bottom_margin: tongue_bottom_margin

regions:
  - {id: water_channel, role: transient_water_path, editable: false,
     label: "Water channel",
     description: the constant-depth transient path — nothing may cut into it}
  - {id: lap_lip, role: transient_water_path, editable: false,
     label: "Lap lip (outlet)",
     description: "continues the channel floor plane past the face — never
       blended, never perforated, top IS the floor level"}
  - {id: lap_receiver, role: transient_water_path, editable: false,
     label: "Lap receiver (inlet)",
     description: "through open-bottom landing for the neighbour's lip —
       the tip slot stays deliberately open"}
  - {id: cassette_seat_walls, role: interface_keepout, editable: false,
     label: "Cassette seat walls"}
  - {id: tongue_edge, role: interface_keepout, editable: false,
     label: "Line tongue (+X)"}
  - {id: groove_edge, role: interface_keepout, editable: false,
     label: "Line groove (-X)"}
  - {id: profile_seat_e, role: interface_keepout, editable: false,
     label: "Profile slot (east)"}
  - {id: profile_seat_w, role: interface_keepout, editable: false,
     label: "Profile slot (west)"}
  - {id: dry_zone_back, role: mounting_surface, editable: true,
     label: "Dry back zone"}

datums:
  - id: cassette_seat
    description: cassette seat — a cassette drops in here
    mates: [removable_insert]
  - id: drain_edge
    description: drain edge of the channel
  - id: feed
    description: feed datum (cap chute drips here)
  - id: inlet
    description: channel inlet
    mates: [fluid_joint, lap_flow_joint]
  - id: outlet
    description: channel outlet — hands water to the next module
    mates: [fluid_joint, lap_flow_joint]
  - id: line_east
    description: east line datum for module chaining
    mates: [tongue_groove]
  - id: line_west
    description: west line datum for module chaining
    mates: [tongue_groove]
  - id: module_origin
    description: module origin
  - id: seat_e
    description: east seat corner
  - id: seat_w
    description: west seat corner

surface_style: molded_utility_part

catalog:
  domain: grow
  modes: [fluid_grow, engineering]
  tier: pro
  tags: [water, rail, hydroponic]

interfaces:
  - id: cassette_seat
    type: removable_insert
    gender: female
    datum: cassette_seat
    frame: {normal: "+Z", up: "+Y"}
    clearance: 0.75mm
    region: cassette_seat_walls
    keepouts: [water_channel]
    accepts: [substrate_cassette]
  - id: line_east
    type: tongue_groove
    gender: male
    datum: line_east
    frame: {normal: "+X", up: "+Z", axis: "+Y"}
    clearance: 0.4mm
    region: tongue_edge
    accepts: [water_rail]
  - id: line_west
    type: tongue_groove
    gender: female
    datum: line_west
    frame: {normal: "-X", up: "+Z", axis: "+Y"}
    clearance: 0.4mm
    region: groove_edge
    accepts: [water_rail]
  # Flush lap mates: outlet-on-inlet lands the neighbour at dZ = 0 and
  # dY = module_w + face_gap. Water crosses over the lap lip.
  - id: inlet
    type: fluid_inlet
    gender: female
    datum: inlet
    # axis = flow direction: water travels -Y through every port in a row
    frame: {normal: "+Y", up: "+Z", axis: "-Y"}
    region: lap_receiver
    accepts: [water_rail]
  - id: outlet
    type: fluid_outlet
    gender: male
    datum: outlet
    frame: {normal: "-Y", up: "+Z", axis: "-Y"}
    region: lap_lip
    accepts: [water_rail]
  # Adapter ports: the feed keeps the row's ONLY drip fall (the inlet
  # cap's tower targets it); drain_edge is the lip tip underside the
  # collector catches on the LAST module.
  - id: feed
    type: fluid_inlet
    gender: female
    datum: feed
    frame: {normal: "+Y", up: "+Z", axis: "-Y"}
    accepts: [water_inlet_cap]
  - id: drain_edge
    type: fluid_outlet
    gender: male
    datum: drain_edge
    frame: {normal: "-Y", up: "+Z", axis: "-Y"}
    region: lap_lip
    accepts: [water_collector]
  # Bottom grooves seat on the aluminum profile carrier. OPTIONAL by
  # design — a standalone cell stays legal; a carried row makes support
  # mandatory via its own contract feature (row_carried_by_profile).
  - id: seat_e
    type: profile_seat
    gender: female
    datum: seat_e
    accepts: [hardware_reference]
    frame: {normal: "-Z", up: "+Y", axis: "-Y"}
  - id: seat_w
    type: profile_seat
    gender: female
    datum: seat_w
    accepts: [hardware_reference]
    frame: {normal: "-Z", up: "+Y", axis: "-Y"}

validators:
  - interface.frame_exists
  - interface.frame_orthonormal
  - interface.normal_points_outward
  - interface.up_consistent
  - interface.keepouts_preserved
  - form.water_channel_constant_depth_ok
  - form.water_channel_dims_ok
  - form.drainage_requires_mount
  - form.lap_joint_geometry_ok
  - form.lap_slot_leak_path_controlled
  - form.lap_receiver_has_floor
  - form.lap_receiver_residual_volume_ok
  - form.rail_universal_inlet_accepts_cap_and_lap
  - form.lightweight_windows_dry_ok
  - form.cassette_support_span_ok
  - form.root_chamber_ok
  - form.magnet_pockets_outside_water_zone
  - form.magnet_pockets_do_not_break_wall
  - form.dock_pockets_dry
  - form.no_standing_water_ir
  - form.no_secondary_water_channel
  - form.cassette_seat_fit_ok
  - form.tongue_groove_profile_ok
  - form.profile_seat_dry_ok
  - topology.water_channel_open
  - topology.water_channel_floor_solid
  - topology.single_connected_solid
  - topology.cutout_present
  - topology.ribs_present

forbidden_forms: []

allowed_modifiers: []

contract:
  must_have:
    - constant_depth_water_channel
    - lap_flow_handover
    - cassette_seat
  must_not_have:
    - closed_water_reservoir
    - dead_water_pocket
    - secondary_water_channel
    - hidden_wet_cavity
  invariants:
    - face_gap >= 0.3 and face_gap <= 0.6
    - lip_len >= 3.0 and lip_len <= 6.0
    - seat_clearance >= 0.5 and seat_clearance <= 1.0
    - edge_clearance >= 0.3 and edge_clearance <= 0.5
